site_name: WildINTEL Misc
site_description: Miscellaneous resources and assets for the WildINTEL project
site_url: https://wildintelproject.github.io/wildintel-misc/
copyright: Copyright &copy; 2026 <a href="https://wildintel.eu/">WildINTEL</a>

repo_url: https://github.com/wildintelproject/wildintel-misc
repo_name: wildintelproject/wildintel-misc

theme:
  name: material
  language: en
  logo: img/WildINTEL_onlyCircle_25.png
  favicon: img/WildINTEL_onlyCircle_25.png

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

# ── Versionado con mike ───────────────────────────────────────────────────────
extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wildintelproject
      name: WildINTEL on GitHub
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/people/WildIntel/61556603674655/
      name: WildINTEL on Facebook
    - icon: simple/bluesky
      link: https://bsky.app/profile/wildintel.bsky.social
      name: WildINTEL on Bluesky
    - icon: fontawesome/solid/globe
      link: https://wildintel.eu/
      name: WildINTEL website

extra_css:
  - stylesheets/extras.css

markdown_extensions:
  - toc:
      title: On this page
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

nav:
  - WildINTEL Misc: index.md
  - About: about.md
